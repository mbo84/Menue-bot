name: Menue Alarm

on:
  schedule:
    # Führt das Skript jeden Montag um 07:00 Uhr (UTC) aus.
    - cron: '0 7 * * 1'
  workflow_dispatch: # Erlaubt es dir, das Skript auch manuell per Klick zu testen

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v3

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Bibliotheken installieren
        run: pip install requests PyPDF2

      - name: Bot starten
        run: python bot.py
